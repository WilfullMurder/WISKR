repos:
  -repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: mixed-line-ending
      args:
        - "--fix=lf"




  -repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v15.0.7
  hooks:
    - id: clang-format
      types_or: [c++, c, cuda]